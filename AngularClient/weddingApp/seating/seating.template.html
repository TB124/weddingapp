<div class="jumbotron text-center">
    <h1>Seating</h1>
</div>
<div class="container" style="padding-bottom: 15px;">
    <div class="col-md-12">
        <div class="col-md-5">
            <h2>Total Persons: {{vm.personsCount}}</h2>
        </div>
        <div class="col-md-2"></div>
        <div class="col-md-15">
            <h2>Persons Without seating: {{vm.personsWithoutTableCount}}</h2>
        </div>
    </div>
    <div class="col-md-12">
        <h3>Tables:</h3>
    </div>
    <div class="col-md-12">
        <div class="col-md-4 div-box" ng-repeat="seating in vm.seatings">
            <div class="row">
                <div class="col-md-8" ng-click="vm.editTable(seating.table)">
                    {{seating.table.name}}
                </div>
                <div class="col-md-3">
                    <button class="btn btn-success" type="button" ng-click="vm.addToTablePopup(seating.table.id)">
                        <i class="glyphicon glyphicon-plus" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
            <hr class="black-hr" />
            <div class="row" ng-repeat="person in seating.persons">
                <div class="col-md-8">
                    {{person.name}}
                </div>
                <div class="col-md-3">
                    <button class="btn btn-danger" type="button" ng-click="vm.removeFromTable(person.id)">
                        <i class="fa fa-trash-o" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
