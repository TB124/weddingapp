<div class="modal-header">
    <h3 class="modal-title" id="modal-title">Add Persons to Table</h3>
</div>
<div class="modal-body" id="modal-body">
    <table datatable="ng" class="table table-bordered">
        <thead>
            <tr>
                <th>Name</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr ng-repeat="person in vm.persons">
                <td>{{person.name}}</td>
                <td>
                    <button class="btn btn-success" type="button" ng-click="vm.addToTable(person.id)">
                        <i class="glyphicon glyphicon-plus" aria-hidden="true"></i>
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
<div class="modal-footer">
    <!--<button class="btn btn-primary" type="button" ng-click="vm.save()">SAVE</button>-->
    <button class="btn btn-warning" type="button" ng-click="vm.cancel()">CANCEL</button>
</div>
